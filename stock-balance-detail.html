<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Balance Report Detail - DRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container-fluid py-5 px-3 px-md-4 page-transition">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 theme-text mb-0">Stock Balance Report Detail</h1>
        <a href="stock-balance.html" class="btn btn-outline-primary">Back to Reports</a>
      </div>

      <div id="detailError" class="alert alert-danger d-none"></div>

      <section id="detailContainer" class="card border-0 shadow-sm d-none">
        <div class="card-body p-4">
          <div class="row g-3 mb-3">
            <div class="col-md-6"><strong>Report ID:</strong> <span id="reportId"></span></div>
            <div class="col-md-6"><strong>Logistic Officer Name:</strong> <span id="officerName"></span></div>
            <div class="col-md-6"><strong>Reported Date:</strong> <span id="reportedDate"></span></div>
            <div class="col-md-6"><strong>Warehouse Name:</strong> <span id="warehouseName"></span></div>
            <div class="col-md-6"><strong>Total Item Types:</strong> <span id="totalItemTypes"></span></div>
            <div class="col-md-6"><strong>Generated Timestamp:</strong> <span id="generatedTimestamp"></span></div>
          </div>

          <h2 class="h5 theme-text">Items</h2>
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Category</th>
                  <th>Quantity Available</th>
                  <th>Unit</th>
                </tr>
              </thead>
              <tbody id="itemsTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="stock-balance-detail.js"></script>
  </body>
</html>
