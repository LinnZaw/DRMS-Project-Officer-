<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRMS Project Officer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container py-5">
      <section id="loginPage" class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 text-center text-success mb-4">Project Officer Login</h1>
              <p class="text-muted text-center mb-4">
                Disaster Release Management System
              </p>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="officer@drms.org"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                  />
                </div>

                <div id="errorMessage" class="alert alert-danger py-2 d-none" role="alert"></div>

                <button type="submit" class="btn btn-success w-100 mt-2">Login</button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <section id="homePage" class="d-none">
        <div class="card shadow border-0">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
              <div>
                <h2 class="text-success mb-1">Project Officer Dashboard</h2>
                <p class="mb-0 text-muted">Welcome to Disaster Release Management System</p>
              </div>
              <button id="logoutBtn" class="btn btn-outline-success">Logout</button>
            </div>

            <hr class="my-4" />

            <div class="organization-card rounded-3 p-4">
              <h3 class="h5 mb-2">Organization Name</h3>
              <p class="fs-4 fw-semibold mb-0">Disaster Relief Management Organization</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
