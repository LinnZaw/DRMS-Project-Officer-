<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRMS Project Officer SPA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container-fluid min-vh-100 px-0">
      <div class="app-shell w-100">
        <section id="loginView" class="login-view p-4 p-md-5">
          <div class="login-card card border-0 shadow-sm mx-auto">
            <div class="card-body p-4 p-md-5">
              <h1 class="h4 text-center theme-text mb-2">Project Officer Login</h1>
              <p class="text-muted text-center mb-4">Disaster Relief Management System</p>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" placeholder="officer@drms.org" required />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" id="password" class="form-control" placeholder="Enter password" required />
                </div>
                <div id="errorMessage" class="alert alert-danger py-2 d-none" role="alert"></div>
                <button type="submit" class="btn btn-theme w-100">Login</button>
              </form>
            </div>
          </div>
        </section>

        <section id="dashboardView" class="dashboard-view d-none">
          <div class="row g-0 app-layout">
            <aside class="col-12 col-lg-3 col-xl-2 sidebar-nav p-3 p-lg-4">
              <h2 class="h5 text-white mb-1">Project Officer</h2>
              <p class="small text-white-50 mb-4">DRMS Control Center</p>

              <nav id="sidebarNav" class="nav nav-pills flex-lg-column gap-2">
                <a class="nav-link text-white" data-route="dashboard" href="#/dashboard">Dashboard</a>
                <a class="nav-link text-white" data-route="stock-balance" href="#/stock-balance">Stock Balance</a>
                <a class="nav-link text-white" data-route="assign-location" href="#/assign-location">Assign Location</a>
                <a class="nav-link text-white" data-route="assign-distribution" href="#/assign-distribution">Assign Distribution</a>
                <a class="nav-link text-white" data-route="manage-beneficiary" href="#/manage-beneficiary">Manage Beneficiary</a>
                <a class="nav-link text-white" data-route="confirm-distribution-records" href="#/confirm-distribution-records">Confirm Distribution Records</a>
              </nav>

              <button id="logoutBtn" class="btn btn-light btn-sm theme-text fw-semibold mt-4 mt-lg-auto">Logout</button>
            </aside>

            <div class="col-12 col-lg-9 col-xl-10 d-flex flex-column">
              <header class="dashboard-header px-3 px-md-4 py-3 border-bottom">
                <h3 id="pageTitle" class="h5 theme-text mb-1">Dashboard</h3>
                <p id="pageSubtitle" class="mb-0 text-muted">Overview of disaster relief operations.</p>
              </header>

              <section id="contentHost" class="content-host p-3 p-md-4"></section>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
